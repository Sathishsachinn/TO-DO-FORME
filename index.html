<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My To-Do — App</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
  <script src="js/app.js" defer></script>
</head>

<body>
  <header class="topbar">
    <div class="brand">To‑Do</div>
    <div class="controls">
      <button id="themeToggle" class="btn icon-btn" title="Toggle theme"><span
          class="material-symbols-rounded">dark_mode</span></button>
    </div>
  </header>

  <main class="container">
    <section class="card todo-panel">
      <div class="panel-header">
        <h2>Your Tasks</h2>
        <div class="filters">

          <span id="dateFilterChip" class="small"
            style="display:none;margin-left:8px;padding:4px 8px;border-radius:999px;background:var(--glass)">
            <span id="dateFilterText"></span>
            <button id="dateFilterClear" class="btn small text-btn" style="margin-left:6px">Clear</button>
          </span>
        </div>
      </div>

      <form id="addForm" class="add-form">
        <input id="taskInput" placeholder="Add a new task..." autocomplete="off" />
        <input id="dueDateInput" type="date" title="Due date" />
        <select id="priorityInput" title="Priority">
          <option value="none">Priority</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <button class="btn">Add</button>
      </form>

      <ul id="taskList" class="task-list" aria-live="polite"></ul>

      <div class="panel-footer">
        <div id="stats" class="muted small">0 tasks</div>
        <button id="clearCompleted" class="btn small danger">Clear completed</button>
        <button id="clearAll" class="btn small danger light">Clear all</button>
      </div>

    </section>

    <!-- Calendar panel -->
    <section class="card" id="calendarPanel">
      <div class="panel-header">
        <h2>Calendar</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="calPrev" class="btn small secondary icon-btn" title="Previous month"><span
              class="material-symbols-rounded">chevron_left</span></button>
          <div id="calMonthLabel" class="strong"></div>
          <button id="calNext" class="btn small secondary icon-btn" title="Next month"><span
              class="material-symbols-rounded">chevron_right</span></button>
          <button id="calClearFilter" class="btn small light" title="Clear date filter"><span
              class="material-symbols-rounded" style="font-size:16px;">event_busy</span></button>
        </div>
      </div>
      <div id="calendarGrid" class="calendar-grid" aria-label="Calendar"></div>
      
      <!-- Explicit Range Selection -->
      <div style="margin-top:16px;display:flex;gap:8px;align-items:center;padding:12px;background:rgba(255,255,255,0.02);border-radius:var(--radius-sm);border:1px solid var(--glass-border);">
          <span class="muted small strong">Select:</span>
          <input id="rangeFromInput" type="date" title="From date" style="padding:6px 10px !important;" />
          <span class="muted small">to</span>
          <input id="rangeToInput" type="date" title="To date" style="padding:6px 10px !important;" />
          <button id="applyRangeBtn" class="btn small secondary" type="button">Apply Range</button>
      </div>

      <div class="muted small" id="calendarHint" style="margin-top:8px;">Click dates, or hold Shift to select a multi-day range for your tasks.
      </div>
    </section>




  </main>

  <footer class="footer muted small">
    <div
      style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1100px;margin:0 auto;">


      <div style="text-align:center;flex:0 1 auto;">© Sathish. All rights reserved.</div>

      <div style="display:flex;align-items:center;">
        <button id="scrollUpBtn" class="btn small secondary" title="Scroll to top"><span
            class="material-symbols-rounded" style="font-size: 16px;">arrow_upward</span> Top</button>
      </div>
    </div>
  </footer>


  <!-- Toast container -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
</body>

</html>
